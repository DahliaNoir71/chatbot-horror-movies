# =============================================================================
# HORRORBOT - Docker Compose Configuration
# =============================================================================
# Full-stack: PostgreSQL + FastAPI + Vue.js + Monitoring + pgAdmin
#
# Usage:
#   docker compose up -d && docker compose logs -f ready # Start + show URLs
#   docker compose --profile monitoring-test up -d       # + monitoring sandbox
#   docker compose up -d                                                  # Start
#   docker compose down                                  # Stop services
#   docker compose logs -f api                           # View API logs
#   docker compose exec db psql -U horrorbot_user -d horrorbot  # Connect to DB
#
# Startup order (via depends_on + healthcheck):
#   db → api → frontend, prometheus → grafana
#   db → pgadmin
#
# -----------------------------------------------------------------------------
# First-time setup — populate the models volume (Docker Desktop Windows)
# -----------------------------------------------------------------------------
# GGUF models are stored in a Docker-managed volume (not a bind mount) to
# avoid the WSL2 ↔ Windows filesystem translation overhead (10–50× slowdown
# on large file I/O). Copy local models into the volume once:
#
#   docker run --rm \
#     -v horrorbot_models:/target \
#     -v ${PWD}/models:/source \
#     alpine sh -c "cp -v /source/*.gguf /target/"
#
# Verify contents:
#   docker run --rm -v horrorbot_models:/models alpine ls -lh /models
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database with pgvector
  # ---------------------------------------------------------------------------
  db:
    image: pgvector/pgvector:pg16
    container_name: horrorbot-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-horrorbot}
      POSTGRES_USER: ${POSTGRES_USER:-horrorbot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-horrorbot_dev_password}
      # Performance tuning
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      # Persistent data storage
      - horrorbot_pgdata:/var/lib/postgresql/data
      # Initialization scripts (executed in alphabetical order)
      - ./docker/init-db:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-horrorbot_user} -d ${POSTGRES_DB:-horrorbot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    # Performance configuration
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "max_worker_processes=4"
      - "-c"
      - "max_parallel_workers_per_gather=2"
      - "-c"
      - "max_parallel_workers=4"
      - "-c"
      - "max_parallel_maintenance_workers=2"

    networks:
      - horrorbot-network

  # ---------------------------------------------------------------------------
  # FastAPI Backend (API + AI models)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: horrorbot-api
    restart: unless-stopped

    env_file: .env

    environment:
      # Override host settings for Docker network
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"

    ports:
      - "8000:8000"

    volumes:
      # AI models — Docker-managed volume (fast ext4 inside WSL2 VM).
      # Populate once via the command documented at the top of this file.
      - horrorbot_models:/app/models
      # ETL outputs (rag_films.json, processed datasets) consumed by importers
      - ./data:/app/data

    depends_on:
      db:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/openapi.json', timeout=3).status == 200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20m

    networks:
      - horrorbot-network

  # ---------------------------------------------------------------------------
  # Vue.js Frontend (nginx + static build)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: horrorbot-frontend
    restart: unless-stopped

    ports:
      - "8080:80"

    depends_on:
      api:
        condition: service_healthy

    networks:
      - horrorbot-network

  # ---------------------------------------------------------------------------
  # pgAdmin (database management UI)
  # ---------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: horrorbot-pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-serge.pfeiffer@proton.me}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"

    ports:
      - "${PGADMIN_PORT:-5050}:80"

    volumes:
      - horrorbot_pgadmin:/var/lib/pgadmin

    depends_on:
      db:
        condition: service_healthy

    networks:
      - horrorbot-network

  # ---------------------------------------------------------------------------
  # Prometheus (metrics collection)
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: horrorbot-prometheus
    restart: unless-stopped

    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - horrorbot_prometheus:/prometheus

    ports:
      - "9090:9090"

    depends_on:
      api:
        condition: service_healthy

    networks:
      - horrorbot-network

  # ---------------------------------------------------------------------------
  # Grafana (dashboards & visualization)
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: horrorbot-grafana
    restart: unless-stopped

    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-thx1138}
      GF_UNIFIED_ALERTING_ENABLED: "true"
      # Allow embedding dashboards in frontend iframes (Phase 6)
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer

    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - horrorbot_grafana:/var/lib/grafana

    ports:
      - "3000:3000"

    depends_on:
      - prometheus

    networks:
      - horrorbot-network

  # ---------------------------------------------------------------------------
  # Prometheus Test (monitoring sandbox — G17)
  # ---------------------------------------------------------------------------
  prometheus-test:
    image: prom/prometheus:latest
    container_name: horrorbot-prometheus-test
    restart: unless-stopped
    profiles:
      - monitoring-test  # docker compose --profile monitoring-test up -d

    volumes:
      - ./docker/prometheus/prometheus.test.yml:/etc/prometheus/prometheus.yml:ro
      - horrorbot_prometheus_test:/prometheus

    ports:
      - "9091:9090"

    networks:
      - horrorbot-network

  # ---------------------------------------------------------------------------
  # Grafana Test (monitoring sandbox — G17)
  # ---------------------------------------------------------------------------
  grafana-test:
    image: grafana/grafana:latest
    container_name: horrorbot-grafana-test
    restart: unless-stopped
    profiles:
      - monitoring-test

    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-thx1138}
      GF_UNIFIED_ALERTING_ENABLED: "true"

    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - horrorbot_grafana_test:/var/lib/grafana

    ports:
      - "3001:3000"

    depends_on:
      - prometheus-test

    networks:
      - horrorbot-network

  # ---------------------------------------------------------------------------
  # Ready banner (one-shot — prints URLs when all services are up)
  # ---------------------------------------------------------------------------
  # Usage: docker compose up -d && docker compose logs -f ready
  ready:
    image: alpine:latest
    container_name: horrorbot-ready
    restart: "no"

    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
      prometheus:
        condition: service_started
      grafana:
        condition: service_started
      pgadmin:
        condition: service_started

    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo ""
        echo "============================================="
        echo "  HORRORBOT — All services are running!"
        echo "============================================="
        echo ""
        echo "  Frontend:   http://localhost:8080"
        echo "  API Docs:   http://localhost:8000/api/docs"
        echo "  Grafana:    http://localhost:3000"
        echo "  Prometheus: http://localhost:9090"
        echo "  pgAdmin:    http://localhost:5050"
        echo ""
        echo "============================================="
        echo ""

    networks:
      - horrorbot-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  horrorbot_pgdata:
    name: horrorbot_pgdata
  horrorbot_pgadmin:
    name: horrorbot_pgadmin
  horrorbot_prometheus:
    name: horrorbot_prometheus
  horrorbot_grafana:
    name: horrorbot_grafana
  horrorbot_prometheus_test:
    name: horrorbot_prometheus_test
  horrorbot_grafana_test:
    name: horrorbot_grafana_test
  horrorbot_models:
    name: horrorbot_models

# =============================================================================
# Networks
# =============================================================================
networks:
  horrorbot-network:
    name: horrorbot-network
    driver: bridge