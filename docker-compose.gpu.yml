# =============================================================================
# HORRORBOT - Docker Compose GPU Override
# =============================================================================
# Enables NVIDIA GPU passthrough for LLM inference.
# Requires nvidia-container-toolkit installed on the host.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
# =============================================================================

services:
  api:
    environment:
      LLM_N_GPU_LAYERS: "-1"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
