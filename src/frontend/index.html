<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HorrorBot — Accueil</title>
  </head>
  <body class="bg-deep-black-900 text-smoke-gray-100 min-h-screen flex flex-col">
    <header class="text-center pt-16 pb-8">
      <h1 class="text-4xl font-bold text-blood-red-500 mb-2">HorrorBot</h1>
      <p class="text-smoke-gray-400 text-lg">Chatbot RAG spécialisé films d'horreur</p>
      <p class="text-smoke-gray-500 text-sm mt-2">Projet éducatif — Propulsé par IA</p>
    </header>

    <main id="main-content" class="flex-1 flex items-start justify-center px-4 pb-16">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 max-w-2xl w-full mt-8">
        <a
          href="/chatbot.html"
          class="block bg-deep-black-700 rounded-xl p-8 text-center hover:ring-2 hover:ring-blood-red-500 transition-all focus:outline-none focus:ring-2 focus:ring-blood-red-500"
          aria-label="Accéder au chatbot"
        >
          <div class="text-5xl mb-4" aria-hidden="true">💬</div>
          <h2 class="text-xl font-semibold text-smoke-gray-100 mb-2">Chatbot</h2>
          <p class="text-smoke-gray-400 text-sm">Posez vos questions sur les films d'horreur</p>
        </a>

        <a
          href="/admin.html"
          class="block bg-deep-black-700 rounded-xl p-8 text-center hover:ring-2 hover:ring-blood-red-500 transition-all focus:outline-none focus:ring-2 focus:ring-blood-red-500"
          aria-label="Accéder à l'administration"
        >
          <div class="text-5xl mb-4" aria-hidden="true">🎬</div>
          <h2 class="text-xl font-semibold text-smoke-gray-100 mb-2">Administration</h2>
          <p class="text-smoke-gray-400 text-sm">Dashboard et catalogue de films</p>
        </a>
      </div>
    </main>

    <footer class="text-center text-sm text-smoke-gray-500 py-4 border-t border-smoke-gray-800">
      HorrorBot — Propulsé par IA | Ce chatbot est un projet éducatif
    </footer>

    <script type="module" src="/src/main-landing.ts"></script>
  </body>
</html>
