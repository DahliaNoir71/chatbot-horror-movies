# =============================================================================
# HORRORBOT Frontend - nginx Configuration
# =============================================================================
# Serves Vue.js static build and proxies /api to the FastAPI backend.
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── API proxy (FastAPI backend) ──────────────────────────────────────────
    location /api {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming support (chat/stream endpoint)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }

    # ── Prometheus metrics passthrough ───────────────────────────────────────
    location /metrics {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }

    # ── Integration client passthrough ───────────────────────────────────────
    location /client {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
    }

    # ── Static assets (long cache) ──────────────────────────────────────────
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
