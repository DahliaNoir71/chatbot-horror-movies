# .github/workflows/ci.yml
# ===================================================
# GitHub Actions CI/CD Pipeline — DevSecOps
# ===================================================
# Project : HorrorBot
# Version : 3.0
# Date    : April 2026
#
# Adapted from GitLab CI 3-tier pipeline.
# Branch model: single-branch (main only, no PR).
#
# -- 2-tier architecture --
#
#   Tier 1 (every push, feedback < 3 min):
#     tests, frontend-tests, bandit, gitleaks,
#     python-deps-scan, hadolint
#
#   Tier 2 (every push, heavier 10-30 min):
#     export-deps → owasp, docker+trivy
#
# -- Execution strategy per job --
#
#   Job                     | push main | Blocking?
#   ------------------------|-----------|----------------------------
#   tests                   |     ✓     | Always
#   frontend-tests          |     ✓     | Always
#   security-bandit         |     ✓     | Always
#   security-gitleaks       |     ✓     | Always
#   security-python-deps    |     ✓     | Always
#   security-hadolint       |     ✓     | Always (via .hadolint.yaml)
#   prepare-export-deps     |     ✓     | —
#   security-owasp          |     ✓     | Always (CVSS ≥ 7)
#   security-docker-trivy   |     ✓     | Always (CRITICAL,HIGH)
#   pipeline-status         |     ✓     | Single gate
#
# -- Pre-commit / CI consistency --
#
#   - Ruff, Vulture           → pre-commit only
#   - Bandit                  → pre-commit + CI (JSON report → SonarQube)
#   - Gitleaks                → pre-commit (staged) + CI (full history)
#   - Tests, deps scan, OWASP → CI only
#   - Hadolint (Dockerfile)   → CI only (blocking, .hadolint.yaml)
#   - Trivy (Docker image)    → CI only
# ===================================================

name: CI/CD Pipeline — DevSecOps

on:
  push:
    branches: [main]
  workflow_dispatch:

# ===================================================
# Global variables
# ===================================================
env:
  PYTHON_VERSION: "3.12"
  PYTHONUNBUFFERED: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  REPORT_DIR: reports
  SECURITY_DIR: security-reports
  TRIVY_SEVERITY: "CRITICAL,HIGH"

# ===================================================
# Concurrency — cancel previous runs on same branch
# ===================================================
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ===================================================
# JOBS
# ===================================================
jobs:

  # ###########################################################
  #  TIER 1 — Fast feedback (< 3 min)
  # ###########################################################

  # ===================================================
  # Tests Python (unit + coverage)
  # ===================================================
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --group dev --group ml

      - name: Run unit tests with coverage
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          ENVIRONMENT: test
        run: |
          mkdir -p "${{ env.REPORT_DIR }}"
          uv run pytest -v --tb=short \
            -m "not slow" \
            --junitxml="${{ env.REPORT_DIR }}/junit.xml" \
            --cov=src \
            --cov-report=xml:"${{ env.REPORT_DIR }}/coverage.xml" \
            --cov-report=html:"${{ env.REPORT_DIR }}/htmlcov" \
            --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ${{ env.REPORT_DIR }}/coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports
          path: ${{ env.REPORT_DIR }}/
          retention-days: 7

  # ===================================================
  # Tests Frontend (lint + type-check + tests + build)
  # ===================================================
  frontend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: src/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run type-check
        run: npm run type-check

      - name: Run unit tests
        run: npm run test:run

      - name: Build production
        run: npm run build

      - name: Verify bundle size (gzipped < 150 KB)
        run: |
          TOTAL=$(find dist -type f \( -name '*.js' -o -name '*.css' \) -exec gzip -c {} \; | wc -c)
          TOTAL_KB=$((TOTAL / 1024))
          echo "Total gzipped bundle: ${TOTAL_KB} KB (limit: 150 KB)"
          if [ "$TOTAL_KB" -gt 150 ]; then
            echo "::error::Bundle ${TOTAL_KB} KB exceeds 150 KB"
            exit 1
          fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run accessibility tests
        run: npm run test:a11y -- --project=chromium

      - name: Run e2e functional tests
        run: npx playwright test e2e/auth.spec.ts e2e/chat.spec.ts e2e/films.spec.ts --project=chromium

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: src/frontend/playwright-report/
          retention-days: 7

  # ===================================================
  # Bandit — SAST (blocking)
  # ===================================================
  security-bandit:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run Bandit security scan
        run: |
          mkdir -p "${{ env.SECURITY_DIR }}"
          echo "=== Running Bandit SAST analysis ==="
          set +e
          timeout 4m uvx bandit[toml] -c pyproject.toml -r src -f json \
            -o "${{ env.SECURITY_DIR }}/bandit-report.json"
          BANDIT_STATUS=$?
          set -e

          if [ -f "${{ env.SECURITY_DIR }}/bandit-report.json" ] && \
             [ -s "${{ env.SECURITY_DIR }}/bandit-report.json" ]; then
            echo "[OK] Bandit report generated"
            if [ ${BANDIT_STATUS} -eq 0 ]; then
              echo "[OK] No security issues detected"
            else
              echo "[WARN] Security issues detected (exit code: ${BANDIT_STATUS})"
              python3 -m json.tool "${{ env.SECURITY_DIR }}/bandit-report.json" | head -50
            fi
          else
            echo "[FAIL] Bandit report missing or empty"
            BANDIT_STATUS=1
          fi

          if [ ${BANDIT_STATUS} -ne 0 ]; then
            echo "::error::Bandit detected security issues — must be resolved"
            exit ${BANDIT_STATUS}
          fi

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: bandit-report
          path: ${{ env.SECURITY_DIR }}/bandit-report.json
          retention-days: 7

  # ===================================================
  # Gitleaks — Secret detection (blocking)
  # ===================================================
  security-gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Create security reports directory
        run: mkdir -p "${{ env.SECURITY_DIR }}"

      - name: Run Gitleaks (full history)
        uses: docker://zricethezav/gitleaks:latest
        with:
          args: >-
            detect
            --source="."
            --report-format=json
            --report-path=security-reports/gitleaks-report.json
            --verbose

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: gitleaks-report
          path: security-reports/gitleaks-report.json
          retention-days: 7

  # ===================================================
  # Python dependency scan — pip-audit + safety (blocking)
  # ===================================================
  # pip-audit: scans via exported requirements (avoids editable
  # package resolution failure on local project).
  # safety: exit code 64 = operational error (auth/network),
  # not a vulnerability finding — treated as non-blocking.
  security-python-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Export requirements for pip-audit
        run: |
          uv export --frozen --all-groups --all-extras --no-hashes \
            | grep -v "^torch==" \
            > /tmp/requirements-audit.txt
          echo "[OK] requirements-audit.txt generated ($(wc -l < /tmp/requirements-audit.txt) deps)"

      - name: Run pip-audit + safety scans
        run: |
          mkdir -p "${{ env.SECURITY_DIR }}"
          echo "=== Python Dependency Security Scans ==="

          # -- pip-audit: scans via requirements file --
          echo "--- pip-audit vulnerability scan ---"
          set +e
          uv run pip-audit --strict \
            -r /tmp/requirements-audit.txt \
            -f json \
            -o "${{ env.SECURITY_DIR }}/pip-audit.json"
          PIPA_STATUS=$?
          set -e

          if [ ${PIPA_STATUS} -ne 0 ] && \
             [ -f "${{ env.SECURITY_DIR }}/pip-audit.json" ] && \
             [ -s "${{ env.SECURITY_DIR }}/pip-audit.json" ]; then
            echo "[WARN] pip-audit detected vulnerabilities"
            python3 -m json.tool "${{ env.SECURITY_DIR }}/pip-audit.json" | head -50
          else
            echo "[OK] pip-audit clean"
          fi

          # -- safety: scans the installed environment --
          echo "--- Safety vulnerability scan ---"
          set +e
          uv run safety check --output json \
            2>"${{ env.SECURITY_DIR }}/safety-stderr.txt" \
            > "${{ env.SECURITY_DIR }}/safety-report.json"
          SAFETY_STATUS=$?
          set -e

          # safety exit code 64 = operational error (auth/network), not vulnerabilities
          if [ ${SAFETY_STATUS} -eq 64 ]; then
            echo "[WARN] Safety operational error (auth/network) — skipping"
            cat "${{ env.SECURITY_DIR }}/safety-stderr.txt" 2>/dev/null || true
            SAFETY_STATUS=0
          elif [ ${SAFETY_STATUS} -ne 0 ] && \
               [ -f "${{ env.SECURITY_DIR }}/safety-report.json" ] && \
               [ -s "${{ env.SECURITY_DIR }}/safety-report.json" ]; then
            echo "[WARN] Safety detected vulnerabilities"
            python3 -m json.tool "${{ env.SECURITY_DIR }}/safety-report.json" | head -50
          fi

          # -- Aggregated result --
          FINAL_STATUS=$(( PIPA_STATUS + SAFETY_STATUS ))
          if [ ${FINAL_STATUS} -ne 0 ]; then
            echo "::error::Vulnerabilities detected (pip-audit: ${PIPA_STATUS}, safety: ${SAFETY_STATUS})"
            exit 1
          else
            echo "[OK] All Python dependency scans passed"
          fi

      - name: Upload dependency scan reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: dependency-security-reports
          path: |
            ${{ env.SECURITY_DIR }}/pip-audit.json
            ${{ env.SECURITY_DIR }}/safety-report.json
            ${{ env.SECURITY_DIR }}/safety-stderr.txt
          retention-days: 7

  # ===================================================
  # Hadolint — Dockerfile lint (blocking)
  # ===================================================
  # Uses .hadolint.yaml for rule exclusions.
  # Scans both API and Frontend Dockerfiles.
  security-hadolint:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create security reports directory
        run: mkdir -p "${{ env.SECURITY_DIR }}"

      - name: Hadolint — docker/api/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/api/Dockerfile
          format: json
          output-file: security-reports/hadolint-api.json
          # no-fail omitted → blocking by default

      - name: Hadolint — docker/frontend/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/frontend/Dockerfile
          format: json
          output-file: security-reports/hadolint-frontend.json

      - name: Merge Hadolint reports
        if: always()
        run: |
          mkdir -p "${{ env.SECURITY_DIR }}"
          jq -s 'add' \
            security-reports/hadolint-api.json \
            security-reports/hadolint-frontend.json \
            > "${{ env.SECURITY_DIR }}/hadolint-report.json" || true

      - name: Upload Hadolint report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: hadolint-report
          path: ${{ env.SECURITY_DIR }}/hadolint-report.json
          retention-days: 7

  # ###########################################################
  #  TIER 2 — Heavier validation (10-30 min)
  # ###########################################################

  # ===================================================
  # Prepare — Export dependencies from uv.lock
  # ===================================================
  # Required by OWASP Dependency-Check (needs requirements.txt).
  prepare-export-deps:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Export dependencies from uv.lock
        run: |
          echo "=== Ephemeral generation of requirements.txt from uv.lock ==="
          uv export --frozen --no-dev --no-hashes > requirements.txt
          uv export --frozen --all-groups --all-extras --no-hashes > requirements-full.txt
          echo "[OK] requirements.txt generated ($(wc -l < requirements.txt) prod dependencies)"
          echo "[OK] requirements-full.txt generated ($(wc -l < requirements-full.txt) total dependencies)"

      - name: Upload requirements artifacts
        uses: actions/upload-artifact@v5
        with:
          name: requirements
          path: |
            requirements.txt
            requirements-full.txt
          retention-days: 1

  # ===================================================
  # OWASP Dependency-Check (blocking, CVSS ≥ 7)
  # ===================================================
  security-owasp:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [prepare-export-deps]

    container:
      image: owasp/dependency-check-action:latest
      options: --user root

    env:
      _JAVA_OPTIONS: >-
        -Xmx2g -Xms256m
        -XX:MaxMetaspaceSize=256m
        -XX:+UseG1GC -XX:+UseStringDeduplication
        -XX:G1HeapRegionSize=8m -XX:MaxGCPauseMillis=200
        -XX:ParallelGCThreads=2 -XX:ConcGCThreads=1
        -XX:+UseCompressedOops
        -Dfile.encoding=UTF-8
      JAVA_OPTS: "-Xmx2g -Dfile.encoding=UTF-8"
      JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download requirements artifact
        uses: actions/download-artifact@v5
        with:
          name: requirements

      - name: Run OWASP Dependency-Check
        run: |
          mkdir -p "${{ env.SECURITY_DIR }}/dependency-check"
          echo "=== OWASP Dependency-Check ==="
          echo "[INFO] requirements.txt ($(wc -l < requirements.txt) deps)"

          set +e
          timeout 40m \
          /usr/share/dependency-check/bin/dependency-check.sh \
            --project "HorrorBot" \
            --scan . \
            --format HTML \
            --format JSON \
            --format XML \
            --out "${{ env.SECURITY_DIR }}/dependency-check" \
            --noupdate \
            --enableExperimental \
            --exclude "**/node_modules/**" \
            --exclude "**/tests/**" \
            --exclude "**/test/**" \
            --exclude "**/__pycache__/**" \
            --exclude "**/.git/**" \
            --exclude "**/.pytest_cache/**" \
            --exclude "**/*.pyc" \
            --exclude "**/htmlcov/**" \
            --exclude "**/.cache/**" \
            --exclude "**/reports/**" \
            --exclude "**/security-reports/**" \
            --exclude "**/pyproject.toml" \
            --exclude "**/dist/**" \
            --exclude "**/build/**" \
            --exclude "**/.venv/**" \
            $([ -f "suppression.xml" ] && echo "--suppression suppression.xml" || echo "") \
            --failOnCVSS 7
          OWASP_STATUS=$?
          set -e

          if [ ${OWASP_STATUS} -eq 124 ]; then
            echo "::error::OWASP Dependency-Check timed out after 40 minutes"
            exit 1
          fi

          echo "=== Scan finished with code ${OWASP_STATUS} ==="
          ls -lh "${{ env.SECURITY_DIR }}/dependency-check/" || true

          if [ -f "${{ env.SECURITY_DIR }}/dependency-check/dependency-check-report.json" ] && \
             [ -s "${{ env.SECURITY_DIR }}/dependency-check/dependency-check-report.json" ]; then
            echo "[OK] JSON report generated"
            VULN_COUNT=$(grep -c '"severity"' \
              "${{ env.SECURITY_DIR }}/dependency-check/dependency-check-report.json" || echo "0")
            echo "[STAT] Vulnerabilities found: ${VULN_COUNT}"
          else
            echo "::error::OWASP JSON report missing or empty — scan likely failed"
            OWASP_STATUS=1
          fi

          if [ ${OWASP_STATUS} -ne 0 ]; then
            echo "::error::OWASP Dependency-Check found CVEs with CVSS >= 7"
            exit ${OWASP_STATUS}
          fi

      - name: Upload OWASP reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: owasp-dependency-check
          path: ${{ env.SECURITY_DIR }}/dependency-check/
          retention-days: 7

  # ===================================================
  # Docker Build + Trivy — Container scan (blocking)
  # ===================================================
  security-docker-trivy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: horrorbot-api
            dockerfile: docker/api/Dockerfile
            label: api
          - image: horrorbot-frontend
            dockerfile: docker/frontend/Dockerfile
            label: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image — ${{ matrix.label }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.image }}:ci-scan

      - name: Trivy scan (table) — ${{ matrix.label }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ matrix.image }}:ci-scan
          scanners: vuln
          format: table
          severity: ${{ env.TRIVY_SEVERITY }}
          exit-code: "0"

      # Blocking scan — exit-code 1 fails the job on CRITICAL/HIGH
      - name: Trivy scan (JSON, blocking) — ${{ matrix.label }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ matrix.image }}:ci-scan
          scanners: vuln
          format: json
          severity: ${{ env.TRIVY_SEVERITY }}
          output: security-reports/trivy-${{ matrix.label }}-report.json
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy report — ${{ matrix.label }}
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: trivy-report-${{ matrix.label }}
          path: security-reports/trivy-${{ matrix.label }}-report.json
          retention-days: 7

  # ###########################################################
  #  PIPELINE STATUS — Single gate
  # ###########################################################
  # Final job aggregating all checks for branch protection.
  pipeline-status:
    runs-on: ubuntu-latest
    if: always()
    needs:
      # -- Tier 1 --
      - tests
      - frontend-tests
      - security-bandit
      - security-gitleaks
      - security-python-deps
      - security-hadolint
      # -- Tier 2 --
      - prepare-export-deps
      - security-owasp
      - security-docker-trivy

    steps:
      - name: Check pipeline result
        run: |
          echo "=== Pipeline Status ==="
          echo "tests:              ${{ needs.tests.result }}"
          echo "frontend-tests:     ${{ needs.frontend-tests.result }}"
          echo "security-bandit:    ${{ needs.security-bandit.result }}"
          echo "security-gitleaks:  ${{ needs.security-gitleaks.result }}"
          echo "security-python-deps: ${{ needs.security-python-deps.result }}"
          echo "security-hadolint:  ${{ needs.security-hadolint.result }}"
          echo "prepare-export-deps: ${{ needs.prepare-export-deps.result }}"
          echo "security-owasp:     ${{ needs.security-owasp.result }}"
          echo "security-docker-trivy: ${{ needs.security-docker-trivy.result }}"

          # All jobs must succeed
          FAILED=0
          for result in \
            "${{ needs.tests.result }}" \
            "${{ needs.frontend-tests.result }}" \
            "${{ needs.security-bandit.result }}" \
            "${{ needs.security-gitleaks.result }}" \
            "${{ needs.security-python-deps.result }}" \
            "${{ needs.security-hadolint.result }}" \
            "${{ needs.prepare-export-deps.result }}" \
            "${{ needs.security-owasp.result }}" \
            "${{ needs.security-docker-trivy.result }}"; do
            if [ "${result}" != "success" ]; then
              FAILED=$((FAILED + 1))
            fi
          done

          if [ ${FAILED} -ne 0 ]; then
            echo "::error::${FAILED} job(s) failed — pipeline blocked"
            exit 1
          fi

          echo "[OK] All pipeline checks passed"