# .github/workflows/ci.yml
# ===================================================
# Pipeline CI/CD GitHub Actions
# ===================================================
# Ce pipeline exécute les tests unitaires et les analyses de sécurité
# Il s'exécute sur les push/PR vers main et develop

name: CI/CD Pipeline

# ===================================================
# Déclencheurs du pipeline
# ===================================================
on:
  # Exécution sur push vers les branches principales
  push:
    branches: [ main, develop ]

  # Exécution sur les pull requests vers main
  pull_request:
    branches: [ main ]

  # Permet le déclenchement manuel depuis l'interface GitHub
  workflow_dispatch:

# ===================================================
# Variables d'environnement globales
# ===================================================
env:
  PYTHON_VERSION: "3.12"
  PYTHONUNBUFFERED: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# ===================================================
# JOBS DU PIPELINE
# ===================================================
jobs:
  # ============================================
  # JOB 1 : Tests (unitaires + intégration)
  # ============================================
  # Exécute tous les tests avec calcul de la couverture de code
  # Génère des rapports JUnit et Cobertura
  # Couverture minimale requise : 50%
  tests:
    runs-on: ubuntu-latest

    steps:
      # Récupère le code source du repository
      - name: Checkout code
        uses: actions/checkout@v5

      # Installe uv avec cache basé sur uv.lock
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # Installe toutes les dépendances (core + dev + ml)
      - name: Install dependencies
        run: uv sync --locked --group dev --group ml

      # Exécute tous les tests avec pytest et génère les rapports de couverture
      - name: Run all tests with coverage
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          ENVIRONMENT: test
        run: |
          mkdir -p reports
          uv run pytest -v --tb=short \
            -m "not slow" \
            --junitxml=reports/junit.xml \
            --cov=src \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/htmlcov \
            --cov-report=term

      # Upload optionnel vers Codecov pour visualisation
      - name: Upload coverage to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v5
        with:
          files: reports/coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

      # Conserve les rapports de test comme artifacts (7 jours)
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports
          path: reports/
          retention-days: 7

  # ============================================
  # JOB 2 : Tests Frontend (lint + type-check + tests + build)
  # ============================================
  # Vérifie le code frontend Vue.js/TypeScript
  frontend-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/frontend/package-lock.json

      # Installe les dépendances de manière reproductible via le lock file
      - name: Install dependencies
        run: npm ci

      # Vérifie la qualité du code avec ESLint
      - name: Run linter
        run: npm run lint

      # Vérifie les types TypeScript
      - name: Run type-check
        run: npm run type-check

      # Exécute les tests unitaires Vitest
      - name: Run unit tests
        run: npm run test:run

      # Vérifie que le build de production fonctionne
      - name: Build production
        run: npm run build

      # Vérifie que le bundle gzippé total reste sous 150 KB (éco-conception)
      - name: Verify bundle size (gzipped < 150 KB)
        run: |
          TOTAL=$(find dist -type f \( -name '*.js' -o -name '*.css' \) -exec gzip -c {} \; | wc -c)
          TOTAL_KB=$((TOTAL / 1024))
          echo "Total gzipped bundle: ${TOTAL_KB} KB (limit: 150 KB)"
          if [ "$TOTAL_KB" -gt 150 ]; then
            echo "::error::Bundle ${TOTAL_KB} KB exceeds 150 KB"
            exit 1
          fi

      # Installe les navigateurs Playwright pour les tests e2e
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Exécute les tests d'accessibilité axe-core via Playwright
      - name: Run accessibility tests
        run: npm run test:a11y -- --project=chromium

      # Exécute les tests e2e fonctionnels (auth, chat, films)
      - name: Run e2e functional tests
        run: npx playwright test e2e/auth.spec.ts e2e/chat.spec.ts e2e/films.spec.ts --project=chromium

      # Conserve le rapport Playwright en cas d'échec
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: src/frontend/playwright-report/
          retention-days: 7

  # ============================================
  # JOB 3 : Analyse de sécurité Bandit
  # ============================================
  # Scanne le code Python à la recherche de vulnérabilités de sécurité
  security-bandit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Installe et exécute Bandit via uv tool
      - name: Run Bandit security scan
        run: |
          mkdir -p security-reports
          uvx bandit[toml] -r src -f json -o security-reports/bandit-report.json || true

      # Sauvegarde le rapport JSON pour consultation ultérieure
      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: bandit-report
          path: security-reports/bandit-report.json
          retention-days: 7

  # ============================================
  # JOB 4 : Analyse des dépendances avec Safety
  # ============================================
  # Vérifie les vulnérabilités connues dans les dépendances
  security-dependencies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Exporte les dépendances depuis le lock file pour les scanners
      - name: Export dependencies
        run: |
          uv export --no-hashes --no-header --frozen > /tmp/requirements-export.txt

      # Safety : vérifie les vulnérabilités connues (base de données PyUp)
      - name: Run Safety scan
        run: |
          mkdir -p security-reports
          uvx safety check \
            -r /tmp/requirements-export.txt \
            --output json > security-reports/safety-report.json || true

      # pip-audit : vérifie les vulnérabilités (base OSV)
      - name: Run pip-audit scan
        run: |
          uvx pip-audit \
            -r /tmp/requirements-export.txt \
            -f json \
            -o security-reports/pip-audit.json || true

      # Conserve les rapports des deux outils
      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: dependency-security-reports
          path: security-reports/
          retention-days: 7

  # ============================================
  # JOB 5 : OWASP Dependency-Check
  # ============================================
  # Analyse complète des dépendances avec la base OWASP NVD
  security-owasp:
    runs-on: ubuntu-latest

    # Utilise le container Docker officiel OWASP
    container:
      image: owasp/dependency-check-action:latest
      options: --user root

    # Configuration JVM pour optimiser les performances
    env:
      _JAVA_OPTIONS: "-Xmx2g -Xms256m -XX:MaxMetaspaceSize=256m -XX:+UseG1GC -XX:+UseStringDeduplication"
      JAVA_OPTS: "-Xmx2g"

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Exécute OWASP Dependency-Check avec exclusions des dossiers inutiles
      - name: Run OWASP Dependency-Check
        run: |
          mkdir -p security-reports/dependency-check
          /usr/share/dependency-check/bin/dependency-check.sh \
            --project "chatbot-api" \
            --scan . \
            --format HTML \
            --format JSON \
            --format XML \
            --out security-reports/dependency-check \
            --noupdate \
            --enableExperimental \
            --exclude "**/node_modules/**" \
            --exclude "**/tests/**" \
            --exclude "**/test/**" \
            --exclude "**/__pycache__/**" \
            --exclude "**/.git/**" \
            --exclude "**/.pytest_cache/**" \
            --exclude "**/*.pyc" \
            --exclude "**/htmlcov/**" \
            --exclude "**/.cache/**" \
            --exclude "**/reports/**" \
            --exclude "**/security-reports/**" \
            --exclude "**/dist/**" \
            --exclude "**/build/**" \
            --failOnCVSS 7 || true

      # Vérifie que les rapports ont bien été générés
      - name: Check reports generated
        if: always()
        run: |
          ls -lh security-reports/dependency-check/ || true
          if [ -f "security-reports/dependency-check/dependency-check-report.json" ]; then
            echo "Reports generated successfully"
          else
            echo "Reports not found"
          fi

      # Conserve les rapports HTML, JSON et XML pour consultation
      - name: Upload OWASP reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: owasp-dependency-check
          path: security-reports/dependency-check/
          retention-days: 7

  # ============================================
  # JOB 6 : Gitleaks — Détection de secrets
  # ============================================
  # Scanne le code source à la recherche de secrets (clés API, mots de passe, tokens)
  # Sur PR : scanne uniquement le diff (commits entre base et HEAD)
  # Sur push : scanne l'historique complet du dépôt
  security-gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Récupère le code source avec l'historique complet pour le scan
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Créer le répertoire de rapports
        run: mkdir -p security-reports

      # Sur PR : scanne uniquement les commits entre la base et le HEAD
      - name: Run Gitleaks (PR — diff only)
        if: github.event_name == 'pull_request'
        uses: docker://zricethezav/gitleaks:latest
        with:
          args: detect --source="." --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" --report-format=json --report-path=security-reports/gitleaks-report.json --verbose

      # Sur push : scanne l'historique complet
      - name: Run Gitleaks (push — full history)
        if: github.event_name == 'push'
        uses: docker://zricethezav/gitleaks:latest
        with:
          args: detect --source="." --report-format=json --report-path=security-reports/gitleaks-report.json --verbose

      # Sauvegarde le rapport JSON pour consultation ultérieure
      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: gitleaks-report
          path: security-reports/gitleaks-report.json
          retention-days: 7

  # ============================================
  # JOB 7 : Hadolint — Linting des Dockerfiles
  # ============================================
  # Analyse statique des Dockerfiles pour détecter les mauvaises pratiques
  # Warning only : n'échoue pas le pipeline (continue-on-error)
  security-hadolint:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Créer le répertoire de rapports
        run: mkdir -p security-reports

      # Lint du Dockerfile API (FastAPI)
      - name: Hadolint — docker/api/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/api/Dockerfile
          format: json
          output-file: security-reports/hadolint-api.json
          no-fail: true

      # Lint du Dockerfile Frontend (Vue.js → nginx)
      - name: Hadolint — docker/frontend/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/frontend/Dockerfile
          format: json
          output-file: security-reports/hadolint-frontend.json
          no-fail: true

      # Fusionne les deux rapports JSON en un seul fichier
      - name: Fusionner les rapports Hadolint
        if: always()
        run: |
          jq -s 'add' \
            security-reports/hadolint-api.json \
            security-reports/hadolint-frontend.json \
            > security-reports/hadolint-report.json || true

      # Sauvegarde le rapport combiné
      - name: Upload Hadolint report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: hadolint-report
          path: security-reports/hadolint-report.json
          retention-days: 7

  # ============================================
  # JOB 8 : Docker Build + Trivy — Scan d'images
  # ============================================
  # Construit les images Docker sans les pousser, puis les scanne
  # avec Trivy pour détecter les vulnérabilités CRITICAL et HIGH
  # S'exécute uniquement sur PR vers main et push sur main
  security-docker-trivy:
    runs-on: ubuntu-latest

    # Uniquement sur PR vers main ou push sur main
    if: >-
      (github.event_name == 'pull_request' && github.base_ref == 'main') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: horrorbot-api
            dockerfile: docker/api/Dockerfile
            label: api
          - image: horrorbot-frontend
            dockerfile: docker/frontend/Dockerfile
            label: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Configure Docker Buildx pour le build
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Construit l'image Docker sans la pousser (load dans le daemon local)
      - name: Build Docker image — ${{ matrix.label }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.image }}:ci-scan

      - name: Créer le répertoire de rapports
        run: mkdir -p security-reports

      # Scan Trivy — rapport table (lisible dans les logs CI)
      - name: Trivy scan (table) — ${{ matrix.label }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}:ci-scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'

      # Scan Trivy — rapport JSON (artifact pour analyse ultérieure)
      - name: Trivy scan (JSON) — ${{ matrix.label }}
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}:ci-scan
          format: json
          severity: CRITICAL,HIGH
          output: security-reports/trivy-${{ matrix.label }}-report.json
          exit-code: '0'

      # Sauvegarde le rapport Trivy JSON
      - name: Upload Trivy report — ${{ matrix.label }}
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: trivy-report-${{ matrix.label }}
          path: security-reports/trivy-${{ matrix.label }}-report.json
          retention-days: 7

  # ============================================
  # JOB 9 : Validation finale
  # ============================================
  # Job récapitulatif qui s'exécute seulement si tous les jobs précédents réussissent
  build-success:
    runs-on: ubuntu-latest

    # Attend la fin de tous les autres jobs
    needs: [tests, frontend-tests, security-bandit, security-dependencies, security-owasp, security-gitleaks, security-hadolint, security-docker-trivy]

    # S'exécute uniquement si tous les jobs précédents ont réussi
    if: success()

    steps:
      - name: Build successful
        run: echo "All checks passed successfully"
