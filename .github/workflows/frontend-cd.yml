# .github/workflows/frontend-cd.yml
# ===================================================
# Pipeline CD Frontend — Deploy Render + Smoke Test
# ===================================================
# Workflow de livraison continue (C19 — RNCP 37827)
# Déclenché automatiquement après succès du pipeline CI sur main.
# Prérequis : configurer le secret RENDER_DEPLOY_HOOK_URL dans
# GitHub > Settings > Secrets (Render Dashboard > Service > Settings > Deploy Hook)

name: Frontend CD

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    branches: [main]
    types: [completed]

concurrency:
  group: frontend-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    steps:
      - name: Trigger Render deploy
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          echo "Render deploy hook responded with HTTP $RESPONSE"
          if [ "$RESPONSE" != "200" ] && [ "$RESPONSE" != "201" ]; then
            echo "::error::Deploy hook failed with status $RESPONSE"
            exit 1
          fi

  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for deployment and health check
        env:
          DEPLOY_URL: ${{ vars.RENDER_FRONTEND_URL || 'https://horrorbot.onrender.com' }}
        run: |
          MAX_ATTEMPTS=20
          INTERVAL=15
          echo "Polling $DEPLOY_URL (max ${MAX_ATTEMPTS} attempts, every ${INTERVAL}s)..."
          for i in $(seq 1 $MAX_ATTEMPTS); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$DEPLOY_URL")
            echo "Attempt $i/$MAX_ATTEMPTS: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Smoke test passed."
              exit 0
            fi
            sleep $INTERVAL
          done
          echo "::error::Smoke test failed after $MAX_ATTEMPTS attempts"
          exit 1
