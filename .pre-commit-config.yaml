# Main configuration file for pre-commit hooks
# This file defines which hooks will run automatically before each commit
# to ensure code quality and consistency across the project.

repos:
  # ===================================================
  # Basic pre-commit hooks for general code quality
  # ===================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        files: ^src/
      - id: end-of-file-fixer
        files: ^src/
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: ^src/frontend/tsconfig.*\.json$
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: debug-statements
        files: ^src/

  # ===================================================
  # Ruff - The extremely fast Python linter and formatter
  # ===================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^src/.*\.py$
      - id: ruff-format
        files: ^src/.*\.py$

  # ===================================================
  # Vulture - Dead code detection
  # Reads configuration from pyproject.toml
  # ===================================================
  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.16
    hooks:
      - id: vulture
        args: ["src/", "tests/"]
        pass_filenames: false

  # ===================================================
  # Frontend - ESLint, Prettier, TypeScript
  # Hooks locaux car les outils sont dans src/frontend/node_modules
  # ===================================================
  - repo: local
    hooks:
      - id: frontend-eslint
        name: frontend eslint
        entry: bash -c "cd src/frontend && npx eslint --fix src/"
        language: system
        files: ^src/frontend/src/.*\.(ts|vue)$
        pass_filenames: false

      - id: frontend-prettier
        name: frontend prettier
        entry: bash -c "cd src/frontend && npx prettier --write src/"
        language: system
        files: ^src/frontend/src/.*\.(ts|vue|css)$
        pass_filenames: false

      - id: frontend-typecheck
        name: frontend type-check
        entry: bash -c "cd src/frontend && npx vue-tsc -b --noEmit"
        language: system
        files: ^src/frontend/src/.*\.(ts|vue)$
        pass_filenames: false